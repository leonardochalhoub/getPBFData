name: Deploy static web to GitHub Pages
on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site (copy app/web → _site, plus root redirect)
        run: |
          rm -rf _site
          mkdir -p _site
          cp -a app/web/. _site/
          # Root redirect so https://<user>.github.io/<repo>/ loads the app
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="refresh" content="0; url=./app/web/" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>getPBFData</title>
            </head>
            <body>
              <p>Redirecionando para <a href="./app/web/">app/web</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload artifact (_site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
