name: Deploy static web to GitHub Pages
on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    env:
      # Opt into Node.js 24 for JavaScript-based actions (Node 20 deprecation warning)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site (copy app/web → _site, plus legacy /app/web/ path)
        run: |
          rm -rf _site
          mkdir -p _site

          # Primary: publish the web app at the repository root on GitHub Pages
          cp -a app/web/. _site/

          # Root URL requires a top-level index.html. Some Pages builds were serving /app/web/ but
          # returning 404 at / and /index.html; make it explicit.
          cp -a app/web/index.html _site/index.html

          # Legacy: also keep files under /app/web/ so old links still work
          mkdir -p _site/app/web
          cp -a app/web/. _site/app/web/

          # Root cause: Pages sometimes served stale/missing directory content (notably /data and /assets).
          # Make the artifact deterministic by copying the *actual files we need* into the web roots.
          #
          # 1) Put the dataset + geojson directly at the web root:
          #    /gold_pbf_estados_df_geo.json
          #    /brazil-states.geojson
          #
          # 2) Also put them in the legacy root:
          #    /app/web/gold_pbf_estados_df_geo.json
          #    /app/web/brazil-states.geojson
          cp -a app/web/data/gold_pbf_estados_df_geo.json _site/gold_pbf_estados_df_geo.json
          cp -a app/web/data/brazil-states.geojson _site/brazil-states.geojson
          cp -a app/web/data/gold_pbf_estados_df_geo.json _site/app/web/gold_pbf_estados_df_geo.json
          cp -a app/web/data/brazil-states.geojson _site/app/web/brazil-states.geojson

          echo "=== _site top-level ==="
          ls -la _site | sed -n '1,200p'
          echo "=== _site/app/web top-level ==="
          ls -la _site/app/web | sed -n '1,200p'

      - name: Upload artifact (_site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
